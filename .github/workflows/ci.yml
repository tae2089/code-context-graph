name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Test
        run: go test ./...

      - name: Test SQLite FTS
        run: go test -tags fts5 ./internal/store/search ./internal/mcp ./cmd/ccg

  postgres-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ccg_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Test Postgres migrations
        env:
          TEST_POSTGRES_DSN: host=localhost user=postgres password=postgres dbname=ccg_test port=5432 sslmode=disable
        run: go test -p 1 -tags postgres ./cmd/ccg ./internal/store/search
