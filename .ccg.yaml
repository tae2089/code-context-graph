output:
  dir: ./docs
  per_file: true
  index: true

# exclude: regex 패턴 목록. 파일 경로가 매칭되면 파싱에서 제외된다.
exclude:
  - ".*_test\\.go$"
  - "vendor/.*"
  - "node_modules/.*"
  - ".*\\.pb\\.go$"
  - "bin/.*"
  - "docs/.*"
  - "testdata/.*"
  - ".*\\.gen\\.go$"
  - "scripts/.*"
  - "root.go"
  - "main.go"
  - "cmd/.*"

comment_tags:
  standard:
    - param
    - return
    - see
  extended:
    - intent
    - domainRule
    - sideEffect
    - mutates
    - requires
    - ensures

